<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>CRUD Slim</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="p-4">
    <h2 class="mb-3">Sistema</h2>

    <!-- 🔥 MENU -->
    <div class="mb-3">
      <button class="btn btn-primary nav-btn" data-target="clientes">
        Clientes
      </button>
      <button class="btn btn-success nav-btn" data-target="productos">
        Productos
      </button>
      <button class="btn btn-dark nav-btn" data-target="pedidos">
        Pedidos
      </button>
    </div>

    <!-- ================= CLIENTES ================= -->
    <div id="clientes" class="seccion">
      <h4>Cliente</h4>

      <input id="c_nombre" class="form-control mb-2" placeholder="Nombre" />
      <input id="c_email" class="form-control mb-2" placeholder="Email" />
      <input id="c_dni" class="form-control mb-2" placeholder="DNI" />

      <select id="c_sexo" class="form-control mb-2">
        <option value="M">Masculino</option>
        <option value="F">Femenino</option>
      </select>

      <button id="guardarCliente" class="btn btn-primary">Guardar</button>
      <button id="listarClientes" class="btn btn-info">Listar</button>

      <table class="table mt-3" id="tablaClientes"></table>
    </div>

    <!-- ================= PRODUCTOS ================= -->
    <div id="productos" class="seccion d-none">
      <h4>Producto</h4>

      <input id="p_nombre" class="form-control mb-2" placeholder="Nombre" />
      <input id="p_precio" class="form-control mb-2" placeholder="Precio" />

      <button id="guardarProducto" class="btn btn-success">Guardar</button>
      <button id="listarProductos" class="btn btn-info">Listar</button>

      <table class="table mt-3" id="tablaProductos"></table>
    </div>

    <!-- ================= PEDIDOS ================= -->
    <div id="pedidos" class="seccion d-none">
      <h4>Pedido</h4>

      <select id="clienteSelect" class="form-control mb-2"></select>
      <select id="productoSelect" class="form-control mb-2"></select>
      <input
        type="number"
        id="cantidad"
        class="form-control mb-2"
        placeholder="Cantidad"
      />

      <button id="agregar" class="btn btn-primary">Agregar</button>
      <button id="guardarPedido" class="btn btn-dark">Guardar Pedido</button>
      <button id="listarPedidos" class="btn btn-info">Listar</button>

      <table class="table mt-3">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
          </tr>
        </thead>
        <tbody id="detalle"></tbody>
      </table>

      <table class="table mt-3" id="tablaPedidos"></table>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
